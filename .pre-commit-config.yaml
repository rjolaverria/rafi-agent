fail_fast: false

repos:
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run --isolated ty check
        language: system
        types: [python]
        files: ^src/|^tests/
        pass_filenames: false
        require_serial: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        args: [--fix, --exit-non-zero-on-fix]
        language: python
        types_or: [python, pyi, jupyter]
        require_serial: true
      
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: python
        types_or: [python, pyi, jupyter]
        require_serial: true
